  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f0eee9; overflow: hidden;
    }
    #root { width: 100%; height: 100%; }
    .lex-artboard { width: 100%; height: 100%; display: flex; overflow: hidden; }
    .lex-artboard *, .lex-artboard *::before, .lex-artboard *::after { box-sizing: border-box; }

    /* Comercial semantic colors (green/red) per theme */
    .theme-light { --cm-pos: #2E9E5B; --cm-neg: #C0492F; }
    .theme-dark  { --cm-pos: #4FC07D; --cm-neg: #E07A60; }

    /* row + menu hover affordances */
    .cm-row:hover { background: var(--surface-hover); }
    .cm-rowlink:hover { background: var(--surface-hover); }
    .cm-funnel-row:hover { background: var(--surface-hover); }
    .cm-menu-item {
      display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
      padding: 8px 10px; border: none; background: transparent; border-radius: 7px;
      font-size: 12.5px; font-weight: 500; color: var(--text); cursor: pointer;
      font-family: var(--font-sans);
    }
    .cm-menu-item:hover { background: var(--surface-hover); }
    .cm-stagebtn:hover { filter: brightness(0.97); }
    select.input option { background: var(--surface); color: var(--text); }
    select.input:disabled { opacity: 0.55; cursor: not-allowed; }

    /* slide-in modal */
    @keyframes cm-slidein { from { transform: translateX(24px); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
    .cm-slidein { animation: cm-slidein 0.22s cubic-bezier(0.22, 1, 0.36, 1); }

    /* responsive */
    @media (max-width: 1180px) {
      .cm-kpigrid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 980px) {
      .cm-2col { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 720px) {
      .cm-kpigrid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
