<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexIA · Financeiro & Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f0eee9; overflow: hidden;
    }
    #root { width: 100%; height: 100%; }
    .lex-artboard { width: 100%; height: 100%; display: flex; overflow: hidden; }

    /* Financeiro semantic colors (green/red) per theme */
    .theme-light { --fin-pos: #2E9E5B; --fin-neg: #C0492F; }
    .theme-dark  { --fin-pos: #4FC07D; --fin-neg: #E07A60; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>

  <script type="text/babel" src="src/fin/fin-data.jsx"></script>
  <script type="text/babel" src="src/fin/fin-kit.jsx"></script>
  <script type="text/babel" src="src/fin/fin-charts.jsx"></script>
  <script type="text/babel" src="src/fin/fin-ai.jsx"></script>
  <script type="text/babel" src="src/fin/inicio.jsx"></script>
  <script type="text/babel" src="src/fin/plano-acao.jsx"></script>
  <script type="text/babel" src="src/fin/financeiro-1.jsx"></script>
  <script type="text/babel" src="src/fin/financeiro-2.jsx"></script>
  <script type="text/babel" src="src/fin/fin-lists.jsx"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#020D25">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#020D25"/>
      <rect x="360" y="250" width="120" height="300" rx="8" fill="#1F3A6E"/>
      <rect x="500" y="190" width="120" height="360" rx="8" fill="#C0A147"/>
      <rect x="640" y="320" width="120" height="230" rx="8" fill="#2E9E5B"/>
      <circle cx="820" cy="300" r="70" fill="none" stroke="#C0A147" stroke-width="26"/>
      <text x="600" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#F5F1E4">LexIA · Financeiro</text>
    </svg>
  </template>

  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const Themed = ({ theme, children }) => (
      <div className={`lex-artboard theme-${theme}`}>
        <div className="app-screen">{children}</div>
      </div>
    );

    const W = 1280, H = 820;

    // DesignCanvas registers only DCArtboard elements that are DIRECT children
    // of a DCSection (Fragments are flattened, but custom components are
    // opaque). So `pair()` is a plain function returning an array of literal
    // DCArtboard elements — spread inline, they become direct children.
    const pair = (id, Comp) => [
      <DCArtboard key={`${id}-l`} id={`${id}-light`} label="Claro" width={W} height={H}>
        <Themed theme="light"><Comp /></Themed>
      </DCArtboard>,
      <DCArtboard key={`${id}-d`} id={`${id}-dark`} label="Escuro" width={W} height={H}>
        <Themed theme="dark"><Comp /></Themed>
      </DCArtboard>,
    ];

    const App = () => (
      <DesignCanvas>
        {/* ===== Início — 3 variations ===== */}
        <DCSection id="inicio" title="Início · Dashboard A (sem cards de financeiro)" subtitle="Briefing-first, agora orientado às ações — sem a faixa de KPIs financeiros.">
          <DCArtboard id="inicio-a" label="A · Claro" width={W} height={H}><Themed theme="light"><InicioA /></Themed></DCArtboard>
          <DCArtboard id="inicio-a-dark" label="A · Escuro" width={W} height={H}><Themed theme="dark"><InicioA /></Themed></DCArtboard>
        </DCSection>

        {/* ===== Plano de ação (IA) ===== */}
        <DCSection id="plano-acao" title="Plano de ação · LexIA" subtitle="Aberto a partir de “Ver plano de ação” no briefing. Interativo: marque/execute uma ação e o progresso + receita recuperada se atualizam.">
          <DCArtboard id="plano-light" label="Claro" width={W} height={H}><Themed theme="light"><PlanoDeAcao /></Themed></DCArtboard>
          <DCArtboard id="plano-dark" label="Escuro" width={W} height={H}><Themed theme="dark"><PlanoDeAcao /></Themed></DCArtboard>
        </DCSection>

        {/* ===== Financeiro — 6 tabs ===== */}
        <DCSection id="fin-visao" title="Financeiro · Visão geral (A4)" subtitle="KPIs, receita 12 meses, composição e próximo passo.">
          {pair('fin-visao', FinVisaoGeral)}
        </DCSection>
        <DCSection id="fin-receita" title="Financeiro · Receita" subtitle="Projeção de caixa que derrete + detalhamento mensal.">
          {pair('fin-receita', FinReceita)}
        </DCSection>
        <DCSection id="fin-receber" title="Financeiro · A receber & inadimplência" subtitle="Aging, alerta de limite e cobrança por cliente.">
          {pair('fin-receber', FinReceber)}
        </DCSection>
        <DCSection id="fin-custos" title="Financeiro · Custos & DRE" subtitle="DRE com pró-labore separado, ponto de equilíbrio e custos por categoria.">
          {pair('fin-custos', FinCustos)}
        </DCSection>
        <DCSection id="fin-semfee" title="Financeiro · Casos sem fee" subtitle="Casos ativos sem honorário lançado.">
          {pair('fin-semfee', FinCasosSemFee)}
        </DCSection>
        <DCSection id="fin-import" title="Financeiro · Importação" subtitle="Resumo da importação e lançamentos sinalizados.">
          {pair('fin-import', FinImportacao)}
        </DCSection>

        {/* ===== Clientes & Contratos ===== */}
        <DCSection id="clientes" title="Clientes · Lista (A5)" subtitle="PF / PJ / Leads com classificação e nº de casos.">
          {pair('clientes', ClientesScreen)}
        </DCSection>
        <DCSection id="contratos" title="Contratos / Honorários · Lista (A6)" subtitle="Honorários por vencimento, valor, status e modalidade.">
          {pair('contratos', ContratosScreen)}
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
