<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexIA · Módulo de Documentos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f0eee9;
      overflow: hidden;
    }
    #root { width: 100%; height: 100%; }

    /* Artboard wrapper: each artboard hosts a themed app screen. */
    .lex-artboard {
      width: 100%; height: 100%;
      display: flex;
      overflow: hidden;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/screens/form-variations.jsx"></script>
  <script type="text/babel" src="src/screens/form-complete.jsx"></script>
  <script type="text/babel" src="src/screens/01-home.jsx"></script>
  <script type="text/babel" src="src/screens/03-ai-chat.jsx"></script>
  <script type="text/babel" src="src/screens/05-preview.jsx"></script>
  <script type="text/babel" src="src/screens/06-download.jsx"></script>
  <script type="text/babel" src="src/screens/07-history.jsx"></script>
  <script type="text/babel" src="src/screens/08-templates.jsx"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#020D25">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#020D25"/>
      <rect x="420" y="220" width="360" height="440" rx="14" fill="#F5F1E4"/>
      <rect x="420" y="220" width="360" height="40" fill="#C0A147"/>
      <rect x="460" y="300" width="280" height="10" rx="2" fill="#020D25" opacity="0.85"/>
      <rect x="460" y="324" width="240" height="6" rx="2" fill="#020D25" opacity="0.4"/>
      <rect x="460" y="344" width="260" height="6" rx="2" fill="#020D25" opacity="0.4"/>
      <rect x="460" y="380" width="120" height="8" rx="2" fill="#020D25" opacity="0.85"/>
      <rect x="460" y="404" width="280" height="6" rx="2" fill="#020D25" opacity="0.4"/>
      <rect x="460" y="420" width="270" height="6" rx="2" fill="#020D25" opacity="0.4"/>
      <rect x="460" y="436" width="200" height="6" rx="2" fill="#020D25" opacity="0.4"/>
      <text x="600" y="248" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#020D25">L</text>
    </svg>
  </template>

  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    // Themed wrapper renders one app screen at a fixed canvas size.
    const Themed = ({ theme, children }) => (
      <div className={`lex-artboard theme-${theme}`}>
        <div className="app-screen">{children}</div>
      </div>
    );

    const W = 1280;
    const H = 820;

    const Screens = [
      { id: 'home',     title: '01 · Início (AI-first)',     subtitle: 'Composer de IA em destaque, rascunhos primeiro, atalhos e navegação por tipo.', Comp: HomeScreen },
      { id: 'ai',       title: '03 · Editor unificado',       subtitle: 'Form + preview ao vivo + painel da IA. Manual e IA na mesma tela.', Comp: AIChatScreen },
      { id: 'preview',  title: '05 · Revisão',               subtitle: 'Documento gerado + verificações + sugestões da IA.', Comp: PreviewScreen },
      { id: 'download', title: '06 · Download',              subtitle: 'PDF/DOCX, assinatura digital e envio ao cliente.', Comp: DownloadScreen },
      { id: 'history',  title: '07 · Meus documentos',       subtitle: 'Lista filtrável — antes “Histórico”, agora aba interna de Documentos.', Comp: HistoryScreen },
      { id: 'templates',title: '08 · Modelos',               subtitle: 'Biblioteca de modelos — tab interna em Documentos. CTA: “Novo modelo”.', Comp: TemplatesScreen },
    ];

    const App = () => (
      <DesignCanvas>
        {Screens.map(({ id, title, subtitle, Comp }) => (
          <DCSection key={id} id={id} title={title} subtitle={subtitle}>
            <DCArtboard id={`${id}-light`} label="Claro" width={W} height={H}>
              <Themed theme="light"><Comp /></Themed>
            </DCArtboard>
            <DCArtboard id={`${id}-dark`} label="Escuro" width={W} height={H}>
              <Themed theme="dark"><Comp /></Themed>
            </DCArtboard>
          </DCSection>
        ))}
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
