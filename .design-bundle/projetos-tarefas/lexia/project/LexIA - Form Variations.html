<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexIA · Variações de formulário</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f0eee9;
      overflow: hidden;
    }
    #root { width: 100%; height: 100%; }

    .fv-artboard {
      width: 100%; height: 100%;
      overflow: hidden;
    }
    .fv-artboard.theme-light { background: var(--bg); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/screens/form-variations.jsx"></script>
  <script type="text/babel" src="src/screens/form-complete.jsx"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#020D25">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#020D25"/>
      <rect x="420" y="200" width="360" height="460" rx="14" fill="#F5F1E4"/>
      <rect x="460" y="240" width="200" height="10" rx="2" fill="#020D25"/>
      <rect x="460" y="280" width="280" height="40" rx="6" fill="#C0A147" opacity="0.18"/>
      <rect x="460" y="340" width="280" height="40" rx="6" fill="#020D25" opacity="0.06"/>
      <rect x="460" y="400" width="280" height="40" rx="6" fill="#020D25" opacity="0.06"/>
      <rect x="460" y="460" width="280" height="40" rx="6" fill="#020D25" opacity="0.06"/>
    </svg>
  </template>

  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const Themed = ({ children }) => (
      <div className="fv-artboard theme-light">{children}</div>
    );

    const W = 620;
    const H = 1180;

    const App = () => (
      <DesignCanvas>
        <DCSection
          id="complete"
          title="Formulário completo — Contrato de Honorários Advocatícios"
          subtitle="Design final aplicado ao escopo do brief: PF/PJ, múltiplos contratantes, sócios em PJ, 6 tipos de honorários com campos condicionais, botão 'Na assinatura'. Todas as seções abertas pra revisão."
        >
          <DCArtboard id="complete-pf" label="Contratante Pessoa Física · Honorários parcelados" width={400} height={1900}>
            <Themed><FormCompletePF /></Themed>
          </DCArtboard>
          <DCArtboard id="complete-pj" label="Contratante Pessoa Jurídica · Parcelado + êxito" width={400} height={2100}>
            <Themed><FormCompletePJ /></Themed>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="recommended"
          title="E · Híbrido — acordeão limpo (base do design)"
          subtitle="Acordeão de D + tipografia gold de A/C + pill como indicador de progresso. Sem card externo, hierarquia por hairlines (sólida entre seções, tracejada entre subseções). Testado nas 3 larguras do range 300–480px."
        >
          <DCArtboard id="v5-300" label="300px · mínimo" width={300} height={H}>
            <Themed><V5Hybrid /></Themed>
          </DCArtboard>
          <DCArtboard id="v5-380" label="380px · médio" width={380} height={H}>
            <Themed><V5Hybrid /></Themed>
          </DCArtboard>
          <DCArtboard id="v5-480" label="480px · máximo" width={480} height={H}>
            <Themed><V5Hybrid /></Themed>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="form-variations"
          title="Variações anteriores (referência)"
          subtitle="A, C e D pra comparação."
        >
          <DCArtboard id="v1" label="A · Cards (atual)" width={W} height={H}>
            <Themed><V1Cards /></Themed>
          </DCArtboard>
          <DCArtboard id="v3" label="C · Tipográfico (eyebrow lateral)" width={W} height={H}>
            <Themed><V3Typographic /></Themed>
          </DCArtboard>
          <DCArtboard id="v4" label="D · Acordeão progressivo" width={W} height={H}>
            <Themed><V4Accordion /></Themed>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
